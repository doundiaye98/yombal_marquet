{% extends "base.html" %}
{% block title %}Admin — {{ 'Nouveau produit' if is_new else product.name }}{% endblock %}
{% block content %}
<div class="page-wrapper">
  <header class="page-hero page-hero--compact">
    <h1 class="section-title reveal">{{ 'Nouveau produit' if is_new else product.name }}</h1>
  </header>
  {% include "admin/_nav.html" %}
  <section class="section section--flush-top">
    <form method="post" class="form-panel reveal">
      <div class="field-group"><label class="field-label">Slug</label><input class="field-input" name="slug" required value="{{ product.slug or '' }}"></div>
      <div class="field-group"><label class="field-label">Nom</label><input class="field-input" name="name" required value="{{ product.name or '' }}"></div>
      <div class="field-group"><label class="field-label">Résumé</label><input class="field-input" name="summary" value="{{ product.summary or '' }}"></div>
      <div class="field-group"><label class="field-label">Description</label><textarea class="field-textarea" name="description" rows="6" required>{{ product.description or '' }}</textarea></div>
      <div class="field-row-2">
        <div class="field-group"><label class="field-label">Catégorie</label>
          <select class="field-input" name="category">
            {% for key, label in categories.items() %}
            <option value="{{ key }}" {% if product.category == key %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="field-group"><label class="field-label">Prix (€)</label><input class="field-input" name="price_euros" type="number" step="0.01" required value="{{ '%.2f'|format(product.price_cents / 100) if product.price_cents else '0.00' }}"></div>
      </div>
      <div class="field-row-2">
        <div class="field-group"><label class="field-label">Stock (vide = illimité)</label><input class="field-input" name="stock_qty" type="number" value="{{ product.stock_qty if product.stock_qty is not none else '' }}"></div>
        <div class="field-group"><label class="field-label">Emoji</label><input class="field-input" name="icon" maxlength="4" value="{{ product.icon or '🛒' }}"></div>
      </div>
      <div class="field-group"><label class="field-label">Producteur</label>
        <select class="field-input" name="producer_id">
          <option value="">— Aucun —</option>
          {% for pr in producers %}
          <option value="{{ pr.id }}" {% if product.producer_id == pr.id %}selected{% endif %}>{{ pr.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="field-group"><label><input type="checkbox" name="is_active" value="1" {% if product.is_active %}checked{% endif %}> Actif</label></div>
      <button type="submit" class="btn-primary">Enregistrer</button>
      <a href="{{ url_for('admin.admin_products') }}" class="btn-outline">Retour</a>
    </form>
  </section>
</div>
{% endblock %}
