{% extends "base.html" %}
{% block title %}Admin — FAQ{% endblock %}
{% block content %}
<div class="page-wrapper">
  <header class="page-hero page-hero--compact">
    <h1 class="section-title reveal">FAQ</h1>
    <p class="section-sub reveal"><a href="{{ url_for('admin.admin_faq_edit', item_id=None) }}" class="btn-primary">+ Ajouter</a></p>
  </header>
  {% include "admin/_nav.html" %}
  <section class="section section--flush-top">
    <div class="faq-list reveal">
      {% for item in items %}
      <div class="faq-item" style="padding:16px;">
        <strong>{{ item.question }}</strong>
        <p style="margin:8px 0;font-size:14px;color:var(--text2);">{{ item.answer[:120] }}…</p>
        <a href="{{ url_for('admin.admin_faq_edit', item_id=item.id) }}" class="btn-outline">Modifier</a>
      </div>
      {% endfor %}
    </div>
  </section>
</div>
{% endblock %}
