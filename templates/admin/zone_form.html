{% extends "base.html" %}
{% block title %}Admin — Zone livraison{% endblock %}
{% block content %}
<div class="page-wrapper">
  <header class="page-hero page-hero--compact"><h1 class="section-title reveal">{{ 'Nouvelle zone' if is_new else zone.name }}</h1></header>
  {% include "admin/_nav.html" %}
  <section class="section section--flush-top">
    <form method="post" class="form-panel reveal">
      <div class="field-group"><label class="field-label">Nom</label><input class="field-input" name="name" required value="{{ zone.name or '' }}"></div>
      <div class="field-group"><label class="field-label">Préfixe code postal (vide = défaut)</label><input class="field-input" name="postal_prefix" value="{{ zone.postal_prefix or '' }}" placeholder="75, 92…"></div>
      <div class="field-row-2">
        <div class="field-group"><label class="field-label">Tarif livraison (€)</label><input class="field-input" name="price_euros" type="number" step="0.01" value="{{ '%.2f'|format(zone.price_cents / 100) if zone.price_cents else '5.90' }}"></div>
        <div class="field-group"><label class="field-label">Gratuit dès (€, optionnel)</label><input class="field-input" name="free_over_euros" type="number" step="0.01" value="{{ '%.2f'|format(zone.free_over_cents / 100) if zone.free_over_cents else '' }}"></div>
      </div>
      <div class="field-group"><label class="field-label">Ordre</label><input class="field-input" name="sort_order" type="number" value="{{ zone.sort_order or 0 }}"></div>
      <div class="field-group"><label><input type="checkbox" name="is_active" value="1" {% if zone.is_active %}checked{% endif %}> Active</label></div>
      <button type="submit" class="btn-primary">Enregistrer</button>
    </form>
  </section>
</div>
{% endblock %}
