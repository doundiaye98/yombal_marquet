# Déploiement Render — Web Service ou Blueprint (render.yaml à la racine).
# autoDeployTrigger: commit = un push sur la branche liée redéploie le service.
services:
  - type: web
    name: yombal-marquet
    runtime: python
    branch: main
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --timeout 120 --graceful-timeout 30 app:app
    healthCheckPath: /healthz
    autoDeployTrigger: commit
