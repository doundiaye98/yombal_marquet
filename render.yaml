# Déploiement Render — Web Service + PostgreSQL (Blueprint ou référence manuelle).
# Région identique pour la base et le web service (latence + réseau privé).
databases:
  - name: yombal-marquet-db
    plan: free
    region: frankfurt

services:
  - type: web
    name: yombal-marquet
    runtime: python
    branch: main
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    preDeployCommand: FLASK_APP=app.py flask db upgrade
    startCommand: gunicorn --bind 0.0.0.0:$PORT --timeout 120 --graceful-timeout 30 app:app
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    # Variables sensibles à ajouter dans le dashboard Render (Environment) :
    # ADMIN_EMAILS, BOOTSTRAP_ADMIN_PASSWORD (1er déploiement puis retirer),
    # CONTACT_EMAIL, STRIPE_*, PAYPAL_*, BANK_*, MAIL_*,
    # CLOUDINARY_* (images admin persistantes), PAYMENT_SIMULATION=0
    envVars:
      - key: FLASK_APP
        value: app.py
      - key: PAYMENT_SIMULATION
        value: "0"
      - key: DATABASE_URL
        fromDatabase:
          name: yombal-marquet-db
          property: connectionString
      # Si erreur DNS « could not translate host name dpg-…-a » :
      # Dashboard → Postgres → Connect → External → coller l’URL ici (optionnel)
      # - key: DATABASE_EXTERNAL_URL
      #   sync: false
      - key: FLASK_SECRET_KEY
        generateValue: true
