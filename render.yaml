# Déploiement Render — créez une « Web Service » depuis ce dépôt ou « Blueprint » si vous liez ce fichier.
services:
  - type: web
    name: yombal-marquet
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --timeout 120 --graceful-timeout 30 app:app
    healthCheckPath: /healthz
